version: '3.8'

# ✅ 1. CREATE A CUSTOM NETWORK WITH FIXED IPS
networks:
  monitor_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper_service
    networks:
      - monitor_net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka_broker
    depends_on:
      - zookeeper
    networks:
      - monitor_net
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  cassandra:
    image: cassandra:latest
    container_name: cassandra_db
    ports:
      - "9042:9042"
    networks:
      monitor_net:
        # ✅ 2. THIS IS YOUR PERMANENT IP
        ipv4_address: 172.25.0.10
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=EnergyCluster
      - CASSANDRA_DC=datacenter1
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    healthcheck:
      test: ["CMD-SHELL", "[ $$(nodetool statusgossip) = running ]"]
      interval: 30s
      timeout: 10s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_ui
    ports:
      - "3000:3000"
    networks:
      - monitor_net
    volumes:
      - grafana_storage:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=hadesarchitect-cassandra-datasource
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=1s
    restart: always
    depends_on:
      - cassandra

  spark_job:
    build: 
      context: .
      dockerfile: docker/spark/Dockerfile
    image: rta-spark-job:latest
    container_name: spark_processor
    networks:
      - monitor_net
    depends_on:
      kafka:
        condition: service_started
      cassandra:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_TOPIC: "energy-stream-live-v3"
      # ✅ Update Spark to use the name or IP
      CASSANDRA_HOST: "172.25.0.10"
      SPARK_CHECKPOINT_DIR: "/tmp/spark_checkpoint"
      TWILIO_SID: "${TWILIO_SID:-AC_DUMMY}"
      TWILIO_TOKEN: "${TWILIO_TOKEN:-dummy_token}"
      FROM_NUMBER: "${FROM_NUMBER:-+18123125108}"
      TO_NUMBER: "${TO_NUMBER:-+917418921860}"

volumes:
  grafana_storage:
  cassandra_data:

  #http://localhost:3000